<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logged Out</title>
    <style>
        /* font import removed to use system fonts */

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px 32px;
            width: 90%;
            max-width: 400px;
        }

        .icon-circle {
            width: 64px;
            height: 64px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid #6366f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 24px;
            color: #6366f1;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .btn-relogin {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 16px;
            color: white;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon-circle">!</div>
        <h1>Logged Out</h1>
        <p>You have been safely disconnected. <br>See you again soon, $(username)!</p>
        <a href="$(link-login)" class="btn-relogin">Log In Again</a>
    </div>
</body>

</html>
