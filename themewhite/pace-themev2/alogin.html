<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connected ✓</title>
    <style>
        /* font import removed to use system fonts */

        :root {
            --bg-light: #f8fafc;
            --accent-success: #16a34a;
            --accent-primary: #2563eb;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.1);
            --card-radius: 20px;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: rgba(37, 99, 235, 0.1);
            top: -30vw;
            right: -20vw;
            z-index: -1;
            filter: blur(80px);
        }

        .container {
            width: 90%;
            max-width: 300px;
            text-align: center;
            background: #ffffff;
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            padding: 24px 18px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .stats-grid {
            text-align: left;
            margin-bottom: 20px;
            background: #f1f5f9;
            border-radius: 14px;
            padding: 8px 12px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
        }

        .stat-row:not(:last-child) {
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .stat-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 0.3px;
        }

        .stat-value {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-main);
        }

        .btn {
            display: inline-block;
            width: auto;
            min-width: 130px;
            padding: 10px 22px;
            background: var(--accent-primary);
            border-radius: 30px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 11px;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="stats-grid">
            <div class="stat-row">
                <span class="stat-label">Username</span>
                <span class="stat-value">$(mac)</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Data</span>
                <span class="stat-value">$(remain-bytes-total-nice)</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Time left</span>
                <span class="stat-value">$(session-time-left)</span>
            </div>
        </div>

        <a href="$(link-status)" class="btn">Dashboard</a>
    </div>
</body>

</html>
