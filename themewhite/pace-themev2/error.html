<html>

<head>
    <title>Pace wisp Error</title>
    <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <style type="text/css">
        /* font import removed to use system fonts */

        body {
            color: #0f172a;
            font-size: 14px;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        
        .error-container {
            background: #ffffff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }
        
        a:hover {
            text-decoration: underline;
        }

        .error-title {
            font-weight: 800;
            color: #ef4444;
            margin-bottom: 10px;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="error-container">
        <div class="error-title">Hotspot Error</div>
        <div>$(error)</div>
        <br>
        <div style="font-size: 13px; color: #64748b;">
            Back to <a href="$(link-login)">Login Page</a>
        </div>
    </div>
</body>

</html>
