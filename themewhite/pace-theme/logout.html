<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logged Out</title>
    <style>
        /* font import removed to use system fonts */

        body {
            background-color: #f8fafc;
            color: #0f172a;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 24px;
            padding: 48px 32px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .icon-circle {
            width: 64px;
            height: 64px;
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 24px;
            color: #2563eb;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #0f172a;
        }

        p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .btn-relogin {
            display: block;
            width: 100%;
            padding: 16px;
            background: #2563eb;
            border-radius: 16px;
            color: white;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon-circle">!</div>
        <h1>Logged Out</h1>
        <p>You have been safely disconnected. <br>See you again soon, $(username)!</p>
        <a href="$(link-login)" class="btn-relogin">Log In Again</a>
    </div>
</body>

</html>
